services:
  - type: web
    runtime: docker
    name: code-translation-arena-backend
    rootDir: backend
    healthCheckPath: /api/health
    autoDeploy: true

  - type: web
    runtime: static
    name: code-translation-arena-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
